name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint:
    name: Backend Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Pinned to match backend/Dockerfile's base image patch version
          python-version: '3.11.15'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Pinned to match backend/Dockerfile; upgrade deliberately via PR
          version: "0.11.21"
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          uv sync
      
      - name: Run ruff check
        working-directory: ./backend
        run: |
          uv run ruff check .
      
      - name: Check formatting with ruff
        working-directory: ./backend
        run: |
          uv run ruff format --check .

      - name: Import smoke test
        working-directory: ./backend
        env:
          LLM_API_KEY: ci-dummy-key
          LLM_API_URL: https://api.openai.com/v1
          LLM_MODEL: ci-dummy-model
        run: |
          uv run python -c "import app.main"

  frontend-lint:
    name: Frontend Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "10.34.3"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint
        working-directory: ./frontend
        run: pnpm lint
      
      - name: Check formatting with Prettier
        working-directory: ./frontend
        # Must be the strict check script: 'pnpm prettier --check .' expands the
        # 'prettier' script (prettier --write .) and auto-fixes instead of failing
        run: pnpm prettier:check

      - name: Type check
        working-directory: ./frontend
        run: pnpm typecheck

      - name: Build (static export)
        working-directory: ./frontend
        run: pnpm build